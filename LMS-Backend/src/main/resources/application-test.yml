# Used by @ActiveProfiles("test") — in-memory DB, no Flyway, no Redis
spring:
  datasource:
    url: jdbc:h2:mem:lms_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

server:
  servlet:
    context-path: /api

security:
  jwt:
    secret: test-secret-key-at-least-32-characters-long-for-hs256
    expiration: 86400000
    refresh-expiration: 604800000

app:
  cors:
    allowed-origins: http://localhost:3000

logging:
  level:
    root: WARN
    com.towsoth.edu: INFO
