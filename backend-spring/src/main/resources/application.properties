# Server Configuration
server.port=5000
server.servlet.context-path=/api

# JPA / H2 (learning videos & relational entities)
spring.datasource.url=jdbc:h2:mem:towsoth;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Spring Profiles
spring.profiles.active=dev

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/towsoth
spring.data.mongodb.database=towsoth
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=your-jwt-secret-key-here-change-in-production
jwt.expiration=604800000

# YouTube Data API v3 (required for /student/recommendations/videos)
youtube.api.key=${YOUTUBE_API_KEY:}

# AI Server Configuration
ai.server.url=http://localhost:8000
ai.api.key=your-ai-api-key-here

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:3002,https://*.vercel.app

# Logging Configuration
logging.level.root=INFO
logging.level.com.towsoth=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Cache (use simple in dev — avoids requiring a local Redis instance)
spring.cache.type=simple
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Application Name
spring.application.name=towsoth-backend

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

