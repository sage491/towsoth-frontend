# Production / Render — activate with SPRING_PROFILES_ACTIVE=prod
server.port=${PORT:5000}
server.servlet.context-path=/api

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/towsoth}
spring.data.mongodb.database=${MONGODB_DATABASE:towsoth}
spring.data.mongodb.auto-index-creation=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:mem:towsoth;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.cache.type=simple
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001}

jwt.secret=${JWT_SECRET:change-me-in-production}
jwt.expiration=${JWT_EXPIRATION:604800000}

youtube.api.key=${YOUTUBE_API_KEY:}
ai.server.url=${AI_SERVER_URL:http://localhost:8000}
ai.api.key=${AI_API_KEY:}

logging.level.root=INFO
logging.level.com.towsoth=INFO

spring.application.name=towsoth-backend
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
